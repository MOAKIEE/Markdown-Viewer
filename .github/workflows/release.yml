name: Build and Publish Release

on:
  push:
    tags:
      - 'v*'

permissions:
  contents: write

jobs:
  build-and-release:
    runs-on: ubuntu-latest

    steps:
      - name: Check out repository
        uses: actions/checkout@v4

      - name: Set up JDK 17
        uses: actions/setup-java@v4
        with:
          distribution: temurin
          java-version: '17'
          cache: gradle

      - name: Derive release version
        run: |
          VERSION_NAME="${GITHUB_REF_NAME#v}"

          if [ -z "$VERSION_NAME" ]; then
            echo "Missing release tag version."
            exit 1
          fi

          IFS='.' read -r major minor patch <<< "$VERSION_NAME"
          major=${major:-0}
          minor=${minor:-0}
          patch=${patch:-0}

          if ! [[ "$major" =~ ^[0-9]+$ && "$minor" =~ ^[0-9]+$ && "$patch" =~ ^[0-9]+$ ]]; then
            echo "Release tags must use numeric segments, for example v1.2.3."
            exit 1
          fi

          VERSION_CODE=$((major * 10000 + minor * 100 + patch))
          {
            echo "RELEASE_VERSION_NAME=$VERSION_NAME"
            echo "RELEASE_VERSION_CODE=$VERSION_CODE"
          } >> "$GITHUB_ENV"

      - name: Prepare release keystore
        env:
          RELEASE_KEYSTORE_BASE64: ${{ secrets.RELEASE_KEYSTORE_BASE64 }}
          RELEASE_KEYSTORE_PASSWORD: ${{ secrets.RELEASE_KEYSTORE_PASSWORD }}
          RELEASE_KEY_ALIAS: ${{ secrets.RELEASE_KEY_ALIAS }}
          RELEASE_KEY_PASSWORD: ${{ secrets.RELEASE_KEY_PASSWORD }}
        run: |
          if [ -z "$RELEASE_KEYSTORE_BASE64" ] || [ -z "$RELEASE_KEYSTORE_PASSWORD" ] || [ -z "$RELEASE_KEY_ALIAS" ] || [ -z "$RELEASE_KEY_PASSWORD" ]; then
            echo "Missing release signing secrets."
            exit 1
          fi

          printf '%s' "$RELEASE_KEYSTORE_BASE64" | base64 --decode > "$RUNNER_TEMP/release-keystore.jks"

      - name: Make Gradle wrapper executable
        run: chmod +x ./gradlew

      - name: Build release APK
        env:
          RELEASE_KEYSTORE_PATH: ${{ runner.temp }}/release-keystore.jks
          RELEASE_KEYSTORE_PASSWORD: ${{ secrets.RELEASE_KEYSTORE_PASSWORD }}
          RELEASE_KEY_ALIAS: ${{ secrets.RELEASE_KEY_ALIAS }}
          RELEASE_KEY_PASSWORD: ${{ secrets.RELEASE_KEY_PASSWORD }}
          RELEASE_VERSION_NAME: ${{ env.RELEASE_VERSION_NAME }}
          RELEASE_VERSION_CODE: ${{ env.RELEASE_VERSION_CODE }}
        run: ./gradlew assembleRelease

      - name: Publish GitHub Release
        uses: softprops/action-gh-release@v2
        with:
          tag_name: ${{ github.ref_name }}
          name: Release ${{ github.ref_name }}
          generate_release_notes: true
          files: |
            app/build/outputs/apk/release/app-release.apk
          fail_on_unmatched_files: true
          overwrite_files: true